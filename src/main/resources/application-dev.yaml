spring:
  datasource:
    url: jdbc:mysql://localhost:3306/breads_minds?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    username: ${DB_USERNAME:test}
    password: ${DB_PASSWORD:mySecuritY25%}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.breads.minds: DEBUG
    org.springframework.security: INFO
